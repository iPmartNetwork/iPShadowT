name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod tidy

      - name: Build (Linux AMD64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o ipshadowt-linux-amd64 ./cmd/ipshadowt/

      - name: Build (Linux ARM64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o ipshadowt-linux-arm64 ./cmd/ipshadowt/

      - name: Build (Windows AMD64)
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o ipshadowt-windows-amd64.exe ./cmd/ipshadowt/

      - name: Run tests
        run: go test ./... || true
