name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod tidy

      - name: Build Linux AMD64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X 'main.Author=iPmart Network (Ali Hassanzadeh)'" -o ipshadowt-linux-amd64 ./cmd/ipshadowt/

      - name: Build Linux ARM64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X 'main.Author=iPmart Network (Ali Hassanzadeh)'" -o ipshadowt-linux-arm64 ./cmd/ipshadowt/

      - name: Build Windows AMD64
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X 'main.Author=iPmart Network (Ali Hassanzadeh)'" -o ipshadowt-windows-amd64.exe ./cmd/ipshadowt/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ipshadowt-linux-amd64
            ipshadowt-linux-arm64
            ipshadowt-windows-amd64.exe
          generate_release_notes: true
