# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  iPShadowT - Server Configuration (REALITY)
#  Maximum DPI Resistance Mode
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

mode = "server"
log_level = "info"
transport = "reality"
bind_addr = "0.0.0.0:443"
password = "your-secret-password-here"

# Multiplexing
[mux]
concurrency = 8
frame_size = 32768
recv_buffer = 4194304
stream_buffer = 2097152

# Heartbeat
[heartbeat]
enabled = true
interval = 20
timeout = 40

# Performance
[performance]
nodelay = true
keepalive = 15
buffer_profile = "high_throughput"
kernel_tuning = true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  REALITY Protocol Settings
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[reality]
# SNI that clients will use (must match client config)
server_name = "www.google.com"

# Server's private key (generate with: ipshadowt --gen-reality-keys)
private_key = "YOUR_PRIVATE_KEY_HEX"

# Allowed short IDs (one per client or group)
short_id = "YOUR_SHORT_ID"

# Fallback destination for probes/scanners
# When someone connects without valid auth, they see this website
# Choose a site that:
# 1. Uses TLS 1.3
# 2. Has similar latency to your server
# 3. Is popular (not suspicious)
dest = "www.google.com:443"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Anti-DPI Settings (Server-side)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[anti_dpi]
enabled = true
utls_fingerprint = "chrome"
fragment = false          # Server doesn't need fragmentation
padding = true
padding_size = "16-128"
traffic_shape = false

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  How REALITY Works:
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
#  1. Client connects to server on port 443
#  2. Client sends TLS ClientHello that looks exactly like Chrome
#  3. Server checks for authentication marker in ClientHello
#  4. If VALID → Tunnel mode (encrypted data transfer)
#  5. If INVALID → Proxy to www.google.com (probe sees real Google)
#
#  Result: DPI sees normal HTTPS traffic to your server
#          Probes/scanners see a real website
#          Only your clients can use the tunnel
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Generate Keys:
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
#  Run: ./ipshadowt --gen-reality-keys
#
#  Output:
#    Private Key: <hex string> (put in server config)
#    Public Key:  <hex string> (give to clients)
#    Short ID:    <hex string> (share with clients)
#
